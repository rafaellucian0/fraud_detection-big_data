spark.sql.catalog.local=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type=hive
spark.sql.catalog.local.uri=thrift://hive-metastore:9083
spark.sql.catalog.local.warehouse=hdfs://hadoop-namenode:8020/lakehouse/warehouse
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.jars.packages=org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.apache.spark:spark-token-provider-kafka-0-10_2.12:3.5.1,org.postgresql:postgresql:42.7.3
spark.sql.shuffle.partitions=8
spark.serializer=org.apache.spark.serializer.KryoSerializer
spark.hadoop.fs.defaultFS=hdfs://hadoop-namenode:8020
spark.jars.ivy=/tmp/.ivy2
