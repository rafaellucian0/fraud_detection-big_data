# Temporal protocol for the ULB data. Hyperparameters are selected using
# validation only; the final chronological block remains untouched until test.
split:
  train_fraction: 0.60
  validation_fraction: 0.20
  test_fraction: 0.20
repetitions:
  seeds: [42, 52, 62, 72, 82]
selection_metric: auc_pr
thresholds:
  - 0.05
  - 0.10
  - 0.15
  - 0.20
  - 0.25
  - 0.30
  - 0.35
  - 0.40
  - 0.45
  - 0.50
  - 0.55
  - 0.60
  - 0.65
  - 0.70
  - 0.75
  - 0.80
  - 0.85
  - 0.90
  - 0.95
candidates:
  - id: compact
    random_forest:
      num_trees: 80
      max_depth: 8
    gbt:
      max_iter: 50
      max_depth: 3
  - id: extended
    random_forest:
      num_trees: 120
      max_depth: 10
    gbt:
      max_iter: 60
      max_depth: 4
