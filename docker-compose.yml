services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fraud-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 8
    networks:
      - fraud-net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./configs/kafka/topics.sh:/opt/project/configs/kafka/topics.sh:ro
    entrypoint: ["/bin/bash", "/opt/project/configs/kafka/topics.sh"]
    networks:
      - fraud-net

  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: fraud-hadoop-namenode
    environment:
      CLUSTER_NAME: fraud-lakehouse
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:8020
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    networks:
      - fraud-net

  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: fraud-hadoop-datanode
    depends_on:
      - hadoop-namenode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:8020
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    networks:
      - fraud-net

  hive-metastore-db:
    image: postgres:11
    container_name: fraud-hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5433:5432"
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fraud-net

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: fraud-hive-metastore
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      hadoop-namenode:
        condition: service_started
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "9083:9083"
    volumes:
      - ./configs/hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    networks:
      - fraud-net

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: fraud-lakehouse-spark:3.5.1
    container_name: fraud-spark-master
    depends_on:
      - kafka
      - hadoop-namenode
      - hive-metastore
    environment:
      PYTHONPATH: /opt/project/src:/opt/project
      HADOOP_USER_NAME: root
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "-h", "spark-master"]
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./:/opt/project
      - ./configs/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./configs/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - spark_ivy:/tmp/.ivy2
    networks:
      - fraud-net

  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: fraud-lakehouse-spark:3.5.1
    container_name: fraud-spark-worker-1
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_MEMORY: 3G
      SPARK_WORKER_CORES: 2
      PYTHONPATH: /opt/project/src:/opt/project
      HADOOP_USER_NAME: root
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    volumes:
      - ./:/opt/project
      - ./configs/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - spark_ivy:/tmp/.ivy2
    networks:
      - fraud-net

  airflow-db:
    image: postgres:15.7
    container_name: fraud-airflow-db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fraud-net

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: fraud-lakehouse-airflow:2.9.2
    container_name: fraud-airflow-init
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    command: version
    volumes:
      - ./:/opt/project
      - ./dags:/opt/airflow/dags
    networks:
      - fraud-net

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: fraud-lakehouse-airflow:2.9.2
    container_name: fraud-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: fraud-lakehouse-local
    command: webserver
    ports:
      - "8088:8080"
    volumes:
      - ./:/opt/project
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - fraud-net

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: fraud-lakehouse-airflow:2.9.2
    container_name: fraud-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: fraud-lakehouse-local
    command: scheduler
    volumes:
      - ./:/opt/project
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - fraud-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: fraud-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8089:8080"
    networks:
      - fraud-net

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hive_metastore_db:
  airflow_db:
  airflow_logs:
  spark_ivy:

networks:
  fraud-net:
    name: fraud-net
